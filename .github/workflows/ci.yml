name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-latest
            cc: gcc
            cxx: g++
          - name: Linux Clang
            os: ubuntu-latest
            cc: clang
            cxx: clang++
          - name: macOS AppleClang
            os: macos-latest
            cc: clang
            cxx: clang++

    steps:
      - uses: actions/checkout@v4

      - name: Cache googletest
        uses: actions/cache@v4
        with:
          path: external/googletest-src
          key: googletest-v1.15.2

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure